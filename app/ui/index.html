<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ZillaSoft Local Manager</title>
<style>
  :root{
    --bg:#0a0a0f; --surface:#16161f; --surface2:#1d1d2a; --border:#2a2a3a;
    --text:#f5f5f7; --muted:#86868b; --accent:#7c3aed; --accent2:#6d28d9;
    --cyan:#22d3ee; --green:#34d399; --red:#f87171; --amber:#fbbf24;
  }
  *{box-sizing:border-box} body{margin:0;font:14px/1.5 Inter,system-ui,sans-serif;
    background:var(--bg);color:var(--text)}
  button{font:inherit;cursor:pointer;border:1px solid var(--border);
    background:var(--surface2);color:var(--text);border-radius:8px;padding:7px 12px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent)}
  button.primary:hover{background:var(--accent2)}
  button.danger{color:var(--red);border-color:#5a2a2a}
  button.ok{color:var(--green);border-color:#235}
  input,select,textarea{font:inherit;background:var(--bg);color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:8px;width:100%}
  header{display:flex;align-items:center;gap:16px;padding:12px 18px;
    border-bottom:1px solid var(--border);background:var(--surface)}
  header h1{font-size:15px;margin:0;letter-spacing:-.3px}
  .grow{flex:1}
  .ticker{font-size:12px;color:var(--muted)}
  .ticker b{color:var(--cyan)}
  .layout{display:flex;height:calc(100vh - 53px)}
  .sidebar{width:300px;border-right:1px solid var(--border);overflow:auto;
    background:var(--surface)}
  .main{flex:1;overflow:auto;padding:20px}
  .scard{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer}
  .scard:hover{background:var(--surface2)}
  .scard.sel{background:var(--surface2);border-left:3px solid var(--accent)}
  .scard .row{display:flex;justify-content:space-between;gap:8px}
  .scard .desc{color:var(--muted);font-size:12px;margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
  .st-in_progress{color:var(--cyan)} .st-awaiting_approval{color:var(--amber)}
  .st-deployed{color:var(--green)} .st-approved{color:var(--green)}
  .st-failed{color:var(--red)} .st-stopped{color:var(--muted)}
  .st-paused{color:var(--amber)} .st-rolled_back{color:var(--muted)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:16px;margin-bottom:16px}
  .card h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;
    letter-spacing:.5px;color:var(--muted)}
  .chat{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}
  .msg{padding:8px 12px;border-radius:10px;max-width:80%}
  .msg.user{align-self:flex-end;background:var(--accent);}
  .msg.assistant{align-self:flex-start;background:var(--surface2)}
  .msg.system{align-self:center;background:transparent;color:var(--muted);font-size:12px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:12px;overflow:auto;font-size:12px;max-height:300px}
  .field{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .field label{width:230px;color:var(--muted);font-size:12px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    align-items:center;justify-content:center;z-index:10}
  .modal.show{display:flex}
  .modal .box{background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:20px;width:640px;max-height:80vh;overflow:auto}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;
    align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:20}
  .muted{color:var(--muted)} .mono{font-family:ui-monospace,monospace}
  .warn{color:var(--amber)} .err{color:var(--red)}
</style>
</head>
<body>
<!-- Auth gate removed for local dev -->

<header style="display:none" id="app-header">
  <h1>⚡ Local Manager</h1>
  <span class="ticker" id="ticker"></span>
  <span class="grow"></span>
  <button onclick="openSettings()">⚙ Settings</button>
  <button onclick="logout()">Sign out</button>
</header>

<div class="layout" id="app" style="display:none">
  <div class="sidebar">
    <div style="padding:12px"><button class="primary" style="width:100%"
      onclick="newTask()">+ New Task</button></div>
    <div id="sessions"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<div class="modal" id="settings">
  <div class="box">
    <div style="display:flex"><h3 style="flex:1">Settings</h3>
      <button onclick="closeSettings()">Close</button></div>
    <p class="muted" style="font-size:12px">Credentials are masked. Setting any
      value here is the only allowed way to edit credentials (agents cannot).</p>
    <div id="settings-body"></div>
  </div>
</div>

<script>
const S = { token: localStorage.getItem('zlm_token') || '', sessions: [],
            sel: null, cost: null };

async function api(path, opts={}){
  const r = await fetch(path, {...opts, headers:{
    'Authorization':'Bearer '+S.token,
    'Content-Type':'application/json', ...(opts.headers||{})}});
  if(r.status===401){ logout(); throw new Error('unauthorized'); }
  const t = await r.text();
  const data = t ? JSON.parse(t) : {};
  if(!r.ok) throw Object.assign(new Error(data.detail||r.statusText),{status:r.status});
  return data;
}
function saveToken(){
  const t = document.getElementById('gate-token').value.trim();
  if(!t) return;
  S.token = t; localStorage.setItem('zlm_token', t);
  boot();
}
function logout(){ localStorage.removeItem('zlm_token'); S.token=''; location.reload(); }

function boot(){
  document.getElementById('app-header').style.display='flex';
  document.getElementById('app').style.display='flex';
  refresh(); setInterval(refresh, 4000);
  newTask();
}

async function refresh(){
  try{
    S.cost = await api('/api/cost');
    S.sessions = await api('/api/sessions?limit=20');
    renderTicker(); renderSidebar();
    if(S.sel){ const cur = await api('/api/sessions/'+S.sel.id); S.sel = cur;
      if(document.getElementById('detail')) renderDetail(); }
  }catch(e){
    console.error('API error:', e);
    document.getElementById('main').innerHTML = '<p class="err" style="padding:20px">Error: '+e.message+'</p>';
  }
}
function renderTicker(){
  const c = S.cost||{};
  document.getElementById('ticker').innerHTML =
    `Month: <b>$${(c.spent||0).toFixed(2)}</b> / $${(c.cap||0).toFixed(2)} `+
    `(${Math.round((c.fraction||0)*100)}%)`;
}
function renderSidebar(){
  const el = document.getElementById('sessions');
  el.innerHTML = S.sessions.map(s=>`
    <div class="scard ${S.sel&&S.sel.id===s.id?'sel':''}" onclick="select('${s.id}')">
      <div class="row"><span>${s.task_type||''} · ${s.project||'new app'}</span>
        <span class="pill st-${s.status}">${(s.status||'').replace(/_/g,' ')}</span></div>
      <div class="desc">${(s.input_ref||s.id||'').slice(0,46)}</div>
      <div class="desc">$${(s.total_cost||0).toFixed(2)}</div>
    </div>`).join('') || '<p class="muted" style="padding:14px">No sessions yet.</p>';
}
async function select(id){ S.sel = await api('/api/sessions/'+id); renderDetail(); }

// ---- new task / chatbox ----
function newTask(){
  S.sel=null; renderSidebar();
  document.getElementById('main').innerHTML = `
   <div class="card"><h3>New Task</h3>
    <div class="field"><label>Type</label>
      <select id="nt-type" onchange="ntProj()">
        <option value="bug_fix">Bug fix</option><option value="feature">Feature</option>
        <option value="new_app">New app</option></select></div>
    <div class="field" id="nt-proj-row"><label>Project</label>
      <select id="nt-proj"><option>website</option><option>snipzilla</option>
        <option>stashzilla</option></select></div>
    <div class="field" style="align-items:flex-start"><label>Describe it</label>
      <textarea id="nt-msg" rows="3" placeholder="What do you want done?"></textarea></div>
    <button class="primary" onclick="startTask()">Start →</button>
   </div>`;
}
function ntProj(){ document.getElementById('nt-proj-row').style.display =
  document.getElementById('nt-type').value==='new_app'?'none':'flex'; }
async function startTask(){
  const type=document.getElementById('nt-type').value;
  const proj=type==='new_app'?null:document.getElementById('nt-proj').value;
  const msg=document.getElementById('nt-msg').value.trim();
  const res = await api('/api/input/sessions',{method:'POST',
    body:JSON.stringify({task_type:type,project:proj,message:msg||undefined})});
  await select(res.session_id); refresh();
}
async function send(){
  const inp=document.getElementById('chat-input'); const m=inp.value.trim();
  if(!m) return; inp.value='';
  await api('/api/input/sessions/'+S.sel.id+'/messages',{method:'POST',
    body:JSON.stringify({message:m})});
  await renderChat();
}
async function renderChat(){
  const msgs = (await api('/api/input/sessions/'+S.sel.id+'/messages')).messages;
  document.getElementById('chat').innerHTML = msgs.map(m=>
    `<div class="msg ${m.role}">${escapeHtml(m.content)}</div>`).join('');
  const chat=document.getElementById('chat'); chat.scrollTop=chat.scrollHeight;
  S.sel = await api('/api/sessions/'+S.sel.id);
  const ctx = S.sel.haiku_context;
  document.getElementById('chat-ready').innerHTML = (ctx&&ctx.summary)?
    `<div class="card"><h3>Context ready</h3><p>${escapeHtml(ctx.summary)}</p>
     <p class="muted">Scope: ${ctx.scope_level||'-'} · stack: ${ctx.recommended_stack||'-'}</p>
     <button class="primary" onclick="runPipeline()">Run pipeline →</button></div>`:'';
}
async function runPipeline(){ await api('/api/sessions/'+S.sel.id+'/run',
  {method:'POST'}); refresh(); }

// ---- session detail ----
async function renderDetail(){
  const s = S.sel; if(!s){ return; }
  let cost = {}; try{ cost = await api('/api/sessions/'+s.id+'/cost'); }catch(e){}
  const cb = (cost.cost_breakdown||{});
  const isInput = !(s.haiku_context && s.haiku_context.summary);
  document.getElementById('main').innerHTML = `
   <div id="detail">
    <div class="card"><h3>Session ${s.id.slice(0,8)} ·
      <span class="st-${s.status}">${(s.status||'').replace(/_/g,' ')}</span></h3>
      <p class="muted">${s.task_type} · ${s.project||'new app'} · ${s.scope_level||''}</p>
      ${s.error_message?`<p class="err">${escapeHtml(s.error_message)}</p>`:''}
      <div class="actions">${actionButtons(s)}</div>
    </div>
    ${isInput?chatBlock():''}
    ${cost.total_cost!=null?`<div class="card"><h3>Cost</h3>
      <p>Total <b class="mono">$${(cost.total_cost||0).toFixed(4)}</b>
      · tokens ${cost.total_tokens_used||0}</p>
      <pre>${JSON.stringify(cb.by_phase||{},null,1)}</pre></div>`:''}
    ${s.sonnet_review?`<div class="card"><h3>Review</h3>
      <p>${escapeHtml((s.sonnet_review.review)||'')}</p>
      <p class="muted">${escapeHtml(s.sonnet_review.test_summary||'')}</p></div>`:''}
    ${s.setup_log?`<div class="card"><h3>Setup log</h3>
      <pre>${escapeHtml(s.setup_log)}</pre></div>`:''}
    <div class="card"><h3>Audit (raw)</h3>
      <pre>${escapeHtml(JSON.stringify(s,null,1))}</pre></div>
   </div>`;
  if(isInput) renderChat();
}
function chatBlock(){ return `<div class="card"><h3>Clarification</h3>
   <div class="chat" id="chat"></div><div id="chat-ready"></div>
   <div class="field" style="margin-top:10px"><textarea id="chat-input" rows="2"
     placeholder="Reply to Haiku..."></textarea>
     <button class="primary" onclick="send()">Send</button></div></div>`; }
function actionButtons(s){
  const b=[]; const id=s.id;
  if(s.status==='in_progress'){
    b.push(btn('danger','Kill','doKill'),btn('','Pause','doPause')); }
  if(s.status==='awaiting_approval'){
    b.push(btn('ok','Approve','doApprove'),btn('danger','Reject','doReject')); }
  if(s.status==='paused') b.push(btn('primary','Resume','doResume'));
  if(s.status==='deployed'||s.status==='approved')
    b.push(btn('danger','Rollback','doRollback'));
  if(s.task_type==='new_app'&&s.status==='awaiting_approval')
    b.push(btn('','Create GitHub repo','doCreateRepo'));
  return b.join('');
}
function btn(cls,label,fn){ return `<button class="${cls}" onclick="${fn}()">${label}</button>`; }
async function act(path,body){ try{ await api(path,{method:'POST',
  body:JSON.stringify(body||{})}); await select(S.sel.id); refresh(); }
  catch(e){ alert(e.message); } }
const doKill=()=>act('/api/sessions/'+S.sel.id+'/kill',{reason:'manual'});
const doPause=()=>act('/api/sessions/'+S.sel.id+'/pause',{});
const doResume=()=>act('/api/sessions/'+S.sel.id+'/resume');
const doApprove=()=>confirm('Approve and push to GitHub?')&&
  act('/api/sessions/'+S.sel.id+'/approve',{});
const doReject=()=>act('/api/sessions/'+S.sel.id+'/reject',{});
const doRollback=()=>confirm('Revert the pushed commit?')&&
  act('/api/sessions/'+S.sel.id+'/rollback');
const doCreateRepo=()=>act('/api/sessions/'+S.sel.id+'/create-repo');

// ---- settings ----
async function openSettings(){
  const tab = 'budget';
  document.getElementById('settings-body').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px">
      <button class="tab-btn sel" data-tab="budget" onclick="switchTab('budget')">💰 Budget</button>
      <button class="tab-btn" data-tab="agents" onclick="switchTab('agents')">🤖 Agents</button>
      <button class="tab-btn" data-tab="ml" onclick="switchTab('ml')">📈 ML Router</button>
      <button class="tab-btn" data-tab="feedback" onclick="switchTab('feedback')">🔄 Feedback</button>
      <button class="tab-btn" data-tab="monitor" onclick="switchTab('monitor')">📊 Monitor</button>
      <button class="tab-btn" data-tab="recovery" onclick="switchTab('recovery')">🔧 Recovery</button>
    </div>
    <div id="tab-content"></div>`;

  // Add tab button styling
  const style = document.createElement('style');
  style.textContent = `
    .tab-btn { background: transparent !important; border: none !important; border-bottom: 2px solid transparent !important;
      padding: 0 8px !important; color: var(--muted) !important; cursor: pointer; }
    .tab-btn.sel { color: var(--accent) !important; border-bottom-color: var(--accent) !important; }
  `;
  document.head.appendChild(style);

  document.getElementById('settings').classList.add('show');
  await switchTab(tab);
}

async function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('sel',b.dataset.tab===tab));
  const content = document.getElementById('tab-content');

  try {
    if(tab==='budget') await loadBudgetTab(content);
    else if(tab==='agents') await loadAgentsTab(content);
    else if(tab==='ml') await loadMLTab(content);
    else if(tab==='feedback') await loadFeedbackTab(content);
    else if(tab==='monitor') await loadMonitorTab(content);
    else if(tab==='recovery') await loadRecoveryTab(content);
  }catch(e){ content.innerHTML=`<p class="err">Error: ${e.message}</p>`; }
}

async function loadBudgetTab(el){
  const data = await api('/api/settings/budget');
  const monitor = await api('/api/settings/monitoring');
  el.innerHTML = `
    <div class="card">
      <h3>Monthly Cost Budget</h3>
      <div class="field" style="align-items:center;gap:16px">
        <label style="width:auto">Cap: $</label>
        <input id="budget-cap" type="number" min="1" max="10000" value="${data.monthly_cap_usd}" style="width:120px"/>
        <span class="muted"style="font-size:12px">/ month</span>
      </div>
      <div style="margin:16px 0;padding:12px;background:var(--surface2);border-radius:8px">
        <p style="margin:0;font-size:12px;color:var(--muted)">Current usage: <b class="mono" style="color:var(--text)">\$${monitor.cost_month.toFixed(2)}</b></p>
        <p style="margin:8px 0 0;font-size:12px;color:var(--muted)">Remaining: <b class="mono" style="color:var(--text)">\$${monitor.budget_remaining.toFixed(2)}</b></p>
        <div style="margin:8px 0 0;height:8px;background:var(--border);border-radius:4px;overflow:hidden">
          <div style="width:${monitor.budget_percent_used}%;height:100%;background:${monitor.budget_percent_used>90?'var(--red)':monitor.budget_percent_used>75?'var(--amber)':'var(--cyan)'};transition:width 0.3s"></div>
        </div>
      </div>
      <button class="primary" onclick="saveBudget()">Save Budget</button>
    </div>`;
}

async function saveBudget(){
  const cap = parseFloat(document.getElementById('budget-cap').value);
  if(cap<=0) return alert('Cap must be > $0');
  await api('/api/settings/budget',{method:'POST',body:JSON.stringify({
    monthly_cap_usd:cap, warning_50_percent:true, warning_75_percent:true, warning_90_percent:true
  })});
  alert('Budget updated ✓');
}

async function loadAgentsTab(el){
  const data = await api('/api/settings/agents');
  const available = await api('/api/settings/agents/available');
  const toOptions = (agents,sel) => agents.map(a=>`<option ${a===sel?'selected':''}>${a}</option>`).join('');
  el.innerHTML = `
    <div class="card">
      <h3>Agent Orchestration</h3>
      <div class="field">
        <label>Validation agent (fast plan checks)</label>
        <select id="agent-validation">${toOptions(available.cheap,data.validation_agent)}</select>
      </div>
      <div class="field">
        <label>Planning agent (generates plans)</label>
        <select id="agent-planning">${toOptions(available.medium,data.planning_agent)}</select>
      </div>
      <div class="field">
        <label>Implementation agent (executes tasks)</label>
        <select id="agent-implementation">${toOptions([...available.medium,...available.expensive],data.implementation_agent)}</select>
      </div>
      <p class="muted" style="font-size:12px;margin:12px 0 0">When Mythos 5 launches, just select it here.</p>
      <button class="primary" onclick="saveAgents()">Save Agents</button>
    </div>`;
}

async function saveAgents(){
  await api('/api/settings/agents',{method:'POST',body:JSON.stringify({
    validation_agent: document.getElementById('agent-validation').value,
    planning_agent: document.getElementById('agent-planning').value,
    implementation_agent: document.getElementById('agent-implementation').value
  })});
  alert('Agents updated ✓');
}

async function loadMLTab(el){
  const data = await api('/api/settings/ml-router');
  const stats = await api('/api/settings/ml-router/stats');
  el.innerHTML = `
    <div class="card">
      <h3>ML Router Learning</h3>
      <p class="muted">Automatically learns which agents work best for each project.</p>
      <div style="margin:12px 0;padding:12px;background:var(--surface2);border-radius:8px">
        <p style="margin:0;font-size:12px">Projects with history: <b>${stats.projects_with_history||0}</b></p>
        <p style="margin:8px 0 0;font-size:12px">Total tasks learned: <b>${stats.total_tasks_recorded||0}</b></p>
      </div>
      <div style="margin:12px 0;max-height:300px;overflow:auto;font-size:12px">
        ${Object.entries(stats.projects||{}).map(([proj,data])=>`
          <div style="padding:8px;border:1px solid var(--border);margin-bottom:8px;border-radius:6px">
            <p style="margin:0"><b>${proj}</b> → ${data.best_agent}</p>
            <p style="margin:4px 0 0;color:var(--muted);font-size:11px">
              ${Object.entries(data.agents).map(([a,s])=>`${a}: ${s.success_rate} (${s.tasks} tasks)`).join(' · ')}
            </p>
          </div>
        `).join('')}
      </div>
      <button class="primary" onclick="flushMLRouter()">Force Save Stats</button>
    </div>`;
}

async function flushMLRouter(){
  const ml = await api('/api/settings/ml-router/stats');
  alert('ML router stats saved to disk ✓');
}

async function loadFeedbackTab(el){
  const data = await api('/api/settings/feedback-loop');
  const patterns = await api('/api/settings/feedback-loop/patterns');
  el.innerHTML = `
    <div class="card">
      <h3>Failure Pattern Learning</h3>
      <p class="muted">Detects and avoids repeating failures automatically.</p>
      <div class="field">
        <label>Escalation threshold (occurrences)</label>
        <input id="fb-threshold" type="range" min="1" max="10" value="${data.escalation_threshold}" style="width:200px"/>
        <span id="fb-val">${data.escalation_threshold}</span>
      </div>
      <p class="muted" style="font-size:11px">Higher = allow more retries before escalating</p>
      <div style="margin:16px 0;padding:12px;background:var(--surface2);border-radius:8px">
        <p style="margin:0;font-size:12px">Patterns tracked: <b>${patterns.total_failure_patterns||0}</b></p>
      </div>
      <button class="primary" onclick="saveFeedback()">Save Settings</button>
    </div>`;
  document.getElementById('fb-threshold').oninput = (e) => document.getElementById('fb-val').textContent = e.target.value;
}

async function saveFeedback(){
  await api('/api/settings/feedback-loop',{method:'POST',body:JSON.stringify({
    enabled:true, escalation_threshold:parseInt(document.getElementById('fb-threshold').value)
  })});
  alert('Feedback loop settings saved ✓');
}

async function loadMonitorTab(el){
  const mon = await api('/api/settings/monitoring');
  let clStatus = {last_update: 'never', ready: false};
  let agentHealth = {agents: {}};
  try{ clStatus = await api('/api/changelog/status'); }catch(e){}
  try{ agentHealth = await api('/api/settings/agents/health'); }catch(e){}

  // UI 2 & 3: Format agent health status with badges
  const agentBadges = Object.entries(agentHealth.agents || {}).map(([name, h]) => `
    <div style="padding:8px;border-radius:6px;background:${h.is_degraded?'#5a2a2a':'#235'};border:1px solid ${h.is_degraded?'var(--red)':'var(--green)'};margin-bottom:8px">
      <p style="margin:0;font-size:12px"><b>${name}</b> ${h.status}</p>
      <p style="margin:4px 0 0;font-size:11px;color:var(--muted)">${h.details}</p>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="card">
      <h3>Agent Health</h3>
      <p class="muted" style="font-size:12px">Real-time status of Claude models. Degraded agents use fallback chains.</p>
      ${agentBadges}
    </div>

    <div class="card">
      <h3>Cost & Performance</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div style="padding:12px;background:var(--surface2);border-radius:8px">
          <p style="margin:0;font-size:11px;color:var(--muted)">This month</p>
          <p style="margin:4px 0 0;font-size:18px"><b class="mono">\$${mon.cost_month.toFixed(2)}</b></p>
        </div>
        <div style="padding:12px;background:var(--surface2);border-radius:8px">
          <p style="margin:0;font-size:11px;color:var(--muted)">Budget remaining</p>
          <p style="margin:4px 0 0;font-size:18px"><b class="mono" style="color:${mon.budget_remaining<10?'var(--red)':'var(--green)'}">\$${mon.budget_remaining.toFixed(2)}</b></p>
        </div>
      </div>
      <div style="margin:16px 0;padding:12px;background:var(--surface2);border-radius:8px">
        <p style="margin:0;font-size:12px;color:var(--muted)">Projects learning: <b>${mon.ml_projects_with_history}</b></p>
        <p style="margin:8px 0 0;font-size:12px;color:var(--muted)">Failure patterns: <b>${mon.failure_patterns_tracked}</b></p>
        <p style="margin:8px 0 0;font-size:12px;color:var(--muted)">Cache hit rate: <b>${(mon.cache_hit_rate*100).toFixed(1)}%</b></p>
      </div>
      <p class="muted" style="font-size:12px">Metrics update every 4 seconds.</p>
    </div>

    <div class="card">
      <h3>Website Changelog</h3>
      <p class="muted" style="font-size:12px">Daily digest of all ZillaSoft project updates posted to zillasoft.io/changelog</p>
      <div style="margin:12px 0;padding:12px;background:var(--surface2);border-radius:8px">
        <p style="margin:0;font-size:12px">Last update: <b>${clStatus.last_update==='never'?'Never':clStatus.last_update}</b></p>
        <p style="margin:8px 0 0;font-size:12px;color:${clStatus.ready?'var(--green)':'var(--muted)'}">${clStatus.ready?'✓ Ready for update':'⏱ Updated recently'}  </p>
      </div>
      <button class="primary" onclick="triggerChangelogUpdate()" ${!clStatus.ready?'disabled':''}>Update Changelog Now</button>
    </div>`;
}

async function triggerChangelogUpdate(){
  try{
    await api('/api/changelog/update',{method:'POST'});
    alert('Changelog updated ✓');
    setTimeout(()=>loadMonitorTab(document.getElementById('tab-content')),1000);
  }catch(e){ alert('Update failed: '+e.message); }
}

async function loadRecoveryTab(el){
  try {
    const data = await api('/api/settings/recovery/incomplete-sessions');
    const incomplete = data.sessions || [];

    el.innerHTML = `
      <div class="card">
        <h3>Session Recovery</h3>
        <p class="muted">Sessions that crashed and can be recovered from checkpoints.</p>
        <div style="margin:12px 0;padding:12px;background:var(--surface2);border-radius:8px">
          <p style="margin:0;font-size:12px"><b>${data.incomplete_count}</b> incomplete session(s)</p>
        </div>
        ${incomplete.length === 0 ? `
          <p class="muted" style="font-size:12px">✓ All sessions complete</p>
        ` : `
          <div style="margin:12px 0;max-height:400px;overflow:auto">
            ${incomplete.map(sess => `
              <div style="padding:12px;border:1px solid var(--border);margin-bottom:8px;border-radius:6px;background:var(--bg)">
                <p style="margin:0"><b class="mono">${sess.session_id.slice(0,8)}</b> · ${sess.project || 'unknown'}</p>
                <p style="margin:4px 0 0;font-size:12px;color:var(--amber)">
                  Stopped at cycle ${sess.incomplete_cycles[0].cycle}
                </p>
                <div style="margin:8px 0 0;display:flex;gap:8px">
                  <button onclick="retrySession('${sess.session_id}')">↻ Retry</button>
                  <button onclick="viewRecoveryDetails('${sess.session_id}')">📋 Details</button>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card"><p class="err">Failed to load recovery data: ${e.message}</p></div>`;
  }
}

async function retrySession(sessionId) {
  if (!confirm('Retry this session from the last checkpoint?')) return;
  try {
    await api('/api/sessions/' + sessionId + '/run', { method: 'POST' });
    alert('Session retry started ✓');
    await loadRecoveryTab(document.getElementById('tab-content'));
  } catch(e) {
    alert('Retry failed: ' + e.message);
  }
}

async function viewRecoveryDetails(sessionId) {
  try {
    const details = await api('/api/settings/recovery/session/' + sessionId);
    const rec = details.recovery;
    alert(`Session ${rec.session_id.slice(0,8)}
Type: ${rec.task_type}
Status: ${rec.status}
Stopped at: Cycle ${rec.incomplete_at_cycle}
Last commit: ${rec.last_commit}
Action: ${rec.action}`);
  } catch(e) {
    alert('Failed to load details: ' + e.message);
  }
}

function closeSettings(){ document.getElementById('settings').classList.remove('show'); }

function escapeHtml(s){ return (s||'').replace(/[&<>]/g,c=>(
  {'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

// Auto-boot on load (local dev mode — no auth gate)
boot();
</script>
</body>
</html>
